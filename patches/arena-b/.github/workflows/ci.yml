name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable, beta]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup toolchain install "${{ matrix.rust }}"
          rustup component add rustfmt clippy --toolchain "${{ matrix.rust }}"

      - name: Install Rust (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # On Windows, use the native rustup installer binary instead of the Unix shell script
          Invoke-WebRequest -UseBasicParsing https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          ./rustup-init.exe -y
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.cargo\bin\rustup.exe" toolchain install "${{ matrix.rust }}"
          & "$env:USERPROFILE\.cargo\bin\rustup.exe" component add rustfmt clippy --toolchain "${{ matrix.rust }}"

      - name: Show rustc version and target (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          rustc -Vv
          rustc --print target-list | grep -E "(x86_64|aarch64)"

      - name: Show rustc version and target (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          rustc -Vv
          rustc --print target-list

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: |
          cargo clippy --all-targets --features "debug,virtual_memory,thread_local,lockfree,slab" -- -D warnings
          cargo clippy --all-targets --features "single_thread_fast,debug,virtual_memory,thread_local,slab" -- -D warnings

      - name: Cargo test (feature sets)
        run: |
          cargo test --features "debug,virtual_memory,thread_local,lockfree,slab"
          cargo test --features "single_thread_fast,debug,virtual_memory,thread_local,slab"

      - name: Cargo test (no default features)
        run: cargo test --no-default-features --tests

      - name: Cargo doc
        run: |
          cargo doc --no-deps --features "debug,virtual_memory,thread_local,lockfree,slab"
          cargo doc --no-deps --features "single_thread_fast,debug,virtual_memory,thread_local,slab"

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup toolchain install stable
          rustup component add rustfmt clippy --toolchain stable

      - name: Run arena_vs_box benchmark (short)
        env:
          RUSTFLAGS: "-C debuginfo=0"
        run: cargo bench --bench arena_vs_box -- --sample-size 20
